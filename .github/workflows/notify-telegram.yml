name: Notify Telegram (Reusable)

on:
  workflow_call:
    inputs:
      topic_id:
        description: "Telegram forum topic ID for this repository"
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Build and send Telegram message
        shell: bash
        env:
          TOPIC_ID: ${{ inputs.topic_id }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO_SHORT: ${{ github.repository }}
        run: |
          set -euo pipefail

          escape_html() {
            local s="$1"
            s="${s//#/}"
            s="${s//&/&amp;}"
            s="${s//</&lt;}"
            s="${s//>/&gt;}"
            printf '%s' "$s"
          }

          preview_150() {
            local raw="$1"
            local one_line
            one_line="$(printf '%s' "$raw" | tr '\n' ' ' | tr -s '[:space:]' ' ' | sed 's/^ //; s/ $//')"
            if [ -z "$one_line" ]; then
              printf ''
              return 0
            fi
            if [ "${#one_line}" -gt 150 ]; then
              one_line="${one_line:0:150}…"
            fi
            printf '%s' "$one_line"
          }

          if ! [[ "$CHAT_ID" =~ ^-?[0-9]+$ ]]; then
            echo "Invalid TELEGRAM_CHAT_ID: $CHAT_ID"
            exit 1
          fi
          if ! [[ "$TOPIC_ID" =~ ^[0-9]+$ ]]; then
            echo "Invalid topic_id: $TOPIC_ID"
            exit 1
          fi

          emoji=""
          header=""
          url=""
          title=""
          body=""
          labels=""
          base=""
          head=""
          additions=""
          deletions=""
          is_pr="false"

          if [ "$EVENT_NAME" = "issues" ]; then
            case "$EVENT_ACTION" in
              opened)
                emoji="🆕"
                header="Issue opened"
                ;;
              closed)
                emoji="✅"
                header="Issue closed"
                ;;
              reopened)
                emoji="🔄"
                header="Issue reopened"
                ;;
              *)
                echo "Skip: issues/$EVENT_ACTION"
                exit 0
                ;;
            esac

            number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
            url="$(jq -r '.issue.html_url' "$GITHUB_EVENT_PATH")"
            title="$(jq -r '.issue.title // ""' "$GITHUB_EVENT_PATH")"
            body="$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")"
            labels="$(jq -r '[.issue.labels[]?.name] | join(", ")' "$GITHUB_EVENT_PATH")"
            header="$header #$number"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            case "$EVENT_ACTION" in
              opened)
                emoji="🔀"
                header="PR opened"
                ;;
              ready_for_review)
                emoji="👀"
                header="PR ready for review"
                ;;
              closed)
                merged="$(jq -r '.pull_request.merged' "$GITHUB_EVENT_PATH")"
                if [ "$merged" = "true" ]; then
                  emoji="🟣"
                  header="PR merged"
                else
                  emoji="❌"
                  header="PR closed"
                fi
                ;;
              *)
                echo "Skip: pull_request/$EVENT_ACTION"
                exit 0
                ;;
            esac

            is_pr="true"
            number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
            url="$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")"
            title="$(jq -r '.pull_request.title // ""' "$GITHUB_EVENT_PATH")"
            body="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
            labels="$(jq -r '[.pull_request.labels[]?.name] | join(", ")' "$GITHUB_EVENT_PATH")"
            base="$(jq -r '.pull_request.base.ref // ""' "$GITHUB_EVENT_PATH")"
            head="$(jq -r '.pull_request.head.ref // ""' "$GITHUB_EVENT_PATH")"
            additions="$(jq -r '.pull_request.additions // 0' "$GITHUB_EVENT_PATH")"
            deletions="$(jq -r '.pull_request.deletions // 0' "$GITHUB_EVENT_PATH")"
            header="$header #$number"
          else
            echo "Skip unsupported event: $EVENT_NAME"
            exit 0
          fi

          safe_title="$(escape_html "$title")"
          safe_body="$(escape_html "$(preview_150 "$body")")"
          safe_labels="$(escape_html "$labels")"
          safe_repo="$(escape_html "$REPO_SHORT")"
          safe_base="$(escape_html "$base")"
          safe_head="$(escape_html "$head")"

          message="${emoji} <b>${header}</b>\n<a href=\"${url}\">${safe_title}</a>\n\n📂 <code>${safe_repo}</code>"

          if [ -n "$safe_body" ]; then
            message+="\n📝 <i>${safe_body}</i>"
          fi

          if [ -n "$safe_labels" ]; then
            message+="\n🏷 <i>${safe_labels}</i>"
          fi

          if [ "$is_pr" = "true" ]; then
            message+="\n🎯 <code>${safe_base}</code> ← <code>${safe_head}</code>"
            message+="\n📊 <code>+${additions} −${deletions}</code>"
          fi

          payload="$(jq -n \
            --argjson chat_id "$CHAT_ID" \
            --argjson message_thread_id "$TOPIC_ID" \
            --arg text "$message" \
            '{
              chat_id: $chat_id,
              message_thread_id: $message_thread_id,
              text: $text,
              parse_mode: "HTML",
              disable_web_page_preview: true
            }')"

          response="$(curl -sS --fail-with-body -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$payload")"

          if [ "$(printf '%s' "$response" | jq -r '.ok // false')" != "true" ]; then
            echo "Telegram API error: $response"
            exit 1
          fi

          echo "Telegram notify sent"
